bundle:
  name: medallion_bundle

workspace:
  host: https://dbc-e174c676-4da5.cloud.databricks.com

artifacts:
  medallion_whl:
    type: whl
    path: .

resources:
  jobs:
    medallion_pipeline:
      name: medallion_pipeline_bundle
      tasks:
        - task_key: run_pipeline
          python_wheel_task:
            package_name: medallion
            entry_point: pipeline
          environment_key: default
      environments:
        - environment_key: default
          spec:
            client: "2"
            dependencies:
              - ./dist/*.whl
